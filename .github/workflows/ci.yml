name: CI
on:
  push:
    branches:
      - '**'
      - '!integrated/**'
      - '!stl-preview-head/**'
      - '!stl-preview-base/**'
      - '!generated'
      - '!codegen/**'
      - 'codegen/stl/**'
  pull_request:
    branches-ignore:
      - 'stl-preview-head/**'
      - 'stl-preview-base/**'

jobs:
  lint:
    timeout-minutes: 10
    name: lint
    runs-on: ${{ github.repository == 'stainless-sdks/anthropic-csharp' && 'depot-ubuntu-24.04' || 'ubuntu-latest' }}
    if: (github.event_name == 'push' || github.event.pull_request.head.repo.fork)

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up .NET
        uses: actions/setup-dotnet@55ec9447dda3d1cf6bd587150f3262f30ee10815 # v3.4.2
        with:
          dotnet-version: '8.0.x'

      - name: Run bootstrap
        run: ./scripts/bootstrap

      - name: Run lints
        run: ./scripts/lint
  build:
    timeout-minutes: 10
    name: build
    runs-on: ${{ github.repository == 'stainless-sdks/anthropic-csharp' && 'depot-ubuntu-24.04' || 'ubuntu-latest' }}
    if: (github.event_name == 'push' || github.event.pull_request.head.repo.fork)

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up .NET
        uses: actions/setup-dotnet@55ec9447dda3d1cf6bd587150f3262f30ee10815 # v3.4.2
        with:
          dotnet-version: '8.0.x'

      - name: Build SDK
        run: ./scripts/build

  test:
    timeout-minutes: 10
    name: test
    runs-on: ${{ github.repository == 'stainless-sdks/anthropic-csharp' && 'depot-windows-2022' || 'windows-latest' }}
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '8.0.x'

      - name: Run tests
        run: ./scripts/test
        shell: bash

  detect_breaking_changes_vs_main:
    timeout-minutes: 10
    name: detect-breaking-changes-vs-main
    runs-on: ${{ github.repository == 'stainless-sdks/anthropic-csharp' && 'depot-ubuntu-24.04' || 'ubuntu-latest' }}
    if: |-
      (github.event_name == 'push' &&
       !startsWith(github.ref, 'refs/heads/release-please--')) ||
      github.event.pull_request.head.repo.fork
    steps:
      # fetch-depth: 0 fetches full commit history (all branches, so
      # origin/main is available) so `git merge-base HEAD origin/main`
      # below can resolve the fork point. filter: blob:none keeps the
      # fetch cheap: commit metadata is downloaded eagerly, file blobs
      # only when a later `git checkout` asks for them.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          filter: blob:none

      - name: Set up .NET
        uses: actions/setup-dotnet@55ec9447dda3d1cf6bd587150f3262f30ee10815 # v3.4.2
        with:
          dotnet-version: '8.0.x'

      - name: Determine base SHA
        run: |
          BASE_SHA=$(git merge-base HEAD origin/main 2>/dev/null || echo "")
          echo "BASE_SHA=$BASE_SHA" >> $GITHUB_ENV

      - name: Detect breaking changes vs. main
        if: env.BASE_SHA != ''
        run: |
          # Try to check out previous versions of the breaking change detection script. This ensures that
          # we still detect breaking changes when entire files and their tests are removed.
          git checkout "$BASE_SHA" -- ./scripts/detect-breaking-changes 2>/dev/null || true
          ./scripts/detect-breaking-changes "$BASE_SHA"
